<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/style.css">
    <title>InterApp</title>
</head>

<body>

    <section class="container" id="container">
        <section class="form-container sign-up-container">
            <form action="#">
                <h2>Gestión de Productos</h2>
                <br>
                <section class="social-container">
                    <img src="images/logo.png" alt="" width="180">
                    <br>
                    <br>
                </section>
                <form>
                    <input type="text" placeholder="Nombre del Producto" required>

                    <label for="">Descripción:</label>
                    <textarea name="" placeholder="Nombre del Producto"></textarea><br><br>

                    <label for="">Foto:</label>
                    <input type="file" name="" id=""><br><br>

                    <label for="">Categoría:</label><br>
                    <select name="" id="">
                        <option></option>
                        <option>Electrónica</option>
                        <option>Ropa</option>
                        <option>Deportes</option>
                        <option>calzado</option>
                        <option>Vehiculo</option>
                        <option>Hogar</option>
                    </select><br><br>

                    <label for="">Producto deseado por intercambio:</label><br>
                    <input type="radio" name="" id=""> Electrónica<br>
                    <input type="radio" name="" id=""> Ropa<br>
                    <input type="radio" name="" id=""> Deportes<br>
                    <input type="radio" name="" id=""> calzado<br>
                    <input type="radio" name="" id=""> Vehiculo<br>
                    <input type="radio" name="" id=""> Hogar<br><br>

                    <label for="">Estado:</label><br>
                    <input type="checkbox" name="" id=""> Intercambiado<br><br>

                    <button type="submit">Guardar Producto</button><br>
                    <button type="submit">Editar Producto</button><br>
                    <button>Eliminar Producto</button>
                </form>

                
        </section>
</body>

</html>
