<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/style.css">
    <title>InterApp</title>
</head>

<body>

    <section class="container-registro" id="container">
        <section class="form-container sign-up-container">
            <form action="#">
                <h2>Registro de Usuario</h2>
                <section class="social-container">
                    <img src="images/logo.png" alt="" width="180">
                </section>
                <input type="text" placeholder="Nombre" required>
                <input type="text" placeholder="Usuario" required>
                <input type="date" placeholder="Fecha Nacimiento" required>
                <input type="email" placeholder="Correo Electrónico" required>
                <input type="email" placeholder="Confirmar Correo Electrónico" required>
                <input type="password" placeholder="Contraseña" required>
                <input type="password" placeholder="Confirmar Contraseña" required>
                <input type="number" placeholder="Celular" required>

                <button type="button" onclick="window.location.href='autenticacion.html'">
                    Crear Usuario
                </button>

            </form>
            <br>
            <br>
            <br>
        </section>

        <footer>
            <p>
                Creado por <i class="fa fa-copyright"></i>
                <a>Grupo de los Jueves</a>
            </p>
        </footer>
</body>

</html>
